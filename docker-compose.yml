services:
  web:
    image: ${IMAGE}:main
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flick_web
    restart: always
    ports:
      - "${PORT}:${PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
    networks:
      - main_network

networks:
  main_network:
    external: true
